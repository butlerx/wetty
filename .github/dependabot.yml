---
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(deps)'
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'ci(deps)'
    cooldown:
      default-days: 7
  - package-ecosystem: docker
    directory: '/containers'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(deps)'
    cooldown:
      default-days: 7
