---
name: Release
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Build & Test
    uses: ./.github/workflows/build-and-test.workflow.yml

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      new_release_published: ${{ steps.check.outputs.new_release_published }}
      new_release_version: ${{ steps.check.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Get latest tag before release
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: Check if new release was created
        id: check
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo 'none')
          if [ "$LATEST_TAG" != "${{ steps.before.outputs.tag }}" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

  docker:
    name: Docker Publish
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/docker.workflow.yml
    secrets: inherit
    with:
      platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64
      push: true
