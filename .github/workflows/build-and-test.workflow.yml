---
name: Build & Test
on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
permissions:
  contents: read
jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up mise (Node, Rust, pnpm)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install Node dependencies
        run: pnpm install

      - name: Validate with prek
        run: mise exec -- prek run --all-files

      - name: Lint
        run: mise run lint

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test
        env:
          CI: true

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: restore-build
        with:
          path: ./*
          key: ${{ github.sha }}
