[tools]
node = "22"
rust = "stable"
pnpm = "9.4.0"
prek = "latest"

[settings]
experimental = true

[tasks.build]
description = "Build everything (Rust addon + TypeScript)"
depends     = ["build:rust", "build:ts"]
alias       = "b"

[tasks."test:rust"]
description = "Run Rust unit and integration tests"
run         = "cargo test --workspace"

[tasks."test:ts"]
description = "Run TypeScript/mocha tests"
run         = "pnpm exec mocha"
depends     = ["build"]

[tasks.test]
description = "Run all tests (Rust + TypeScript)"
depends     = ["test:rust", "test:ts"]
alias       = "t"

[tasks.lint]
description = "Lint all sources"
depends     = ["lint:ts", "lint:rust"]
alias       = "l"

[tasks."lint:ts"]
description = "Lint TypeScript sources with ESLint"
run         = "pnpm exec eslint src"

[tasks."lint:ts:fix"]
description = "Auto-fix ESLint issues"
run         = "pnpm exec eslint --fix src"

[tasks."lint:rust"]
description = "Run cargo clippy"
run         = "cargo clippy --workspace -- -D warnings"

[tasks."lint:rust:fix"]
description = "Auto-fix clippy warnings"
run         = "cargo clippy --workspace --fix --allow-dirty -- -D warnings"

[tasks.check]
description = "Type-check all sources"
depends     = ["check:ts", "check:rust"]
alias       = "c"

[tasks."check:ts"]
description = "Type-check TypeScript sources"
run         = "pnpm exec tsc --noEmit"

[tasks."check:rust"]
description = "Check Rust sources compile"
run         = "cargo check --workspace"

[tasks.fmt]
description = "Format all sources"
depends     = ["fmt:ts", "fmt:rust"]
alias       = "f"

[tasks."fmt:ts"]
description = "Format TypeScript sources with Prettier"
run         = "pnpm exec prettier --write src"

[tasks."fmt:rust"]
description = "Format Rust sources"
run         = "cargo fmt --all"
