[tools]
docker-cli     = "latest"
docker-compose = "latest"
node           = "22"
rust           = "stable"
pnpm           = "9.4.0"
prek           = "latest"

[settings]
experimental = true

[env]
_.file = ".env"

[tasks.start]
description = "Start production server"
run         = "NODE_ENV=production node ./build/main.js"
depends     = ["build"]
alias       = "s"

[tasks."start:docker"]
description = "Start services with Docker Compose"
run         = "docker compose up --build"

[tasks.build]
description = "Build everything (Rust addon + TypeScript)"
depends     = ["build:rust", "build:ts"]
alias       = "b"

[tasks."test:rust"]
description = "Run Rust unit and integration tests"
run         = "cargo test --workspace"
sources     = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs"]

[tasks."test:ts"]
description = "Run TypeScript/mocha tests"
run         = "pnpm exec mocha"
depends     = ["build"]
sources     = ["src/**/*.ts", "src/**/*.spec.ts"]

[tasks.test]
description = "Run all tests (Rust + TypeScript)"
depends     = ["test:rust", "test:ts"]
alias       = "t"

[tasks.lint]
description = "Lint all sources"
depends     = ["lint:ts", "lint:rust"]
alias       = "l"

[tasks."lint:fix"]
description = "Auto-fix all sources"
depends     = ["lint:ts:fix", "lint:rust:fix"]

[tasks."lint:ts"]
description = "Lint TypeScript sources with ESLint"
run         = "pnpm exec eslint src"
sources     = ["src/**/*.ts", "eslint.config.mjs"]

[tasks."lint:ts:fix"]
description = "Auto-fix ESLint issues"
run         = "pnpm exec eslint --fix src"
sources     = ["src/**/*.ts", "eslint.config.mjs"]

[tasks."lint:rust"]
description = "Run cargo clippy"
run         = "cargo clippy --workspace -- -D warnings"
sources     = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs"]

[tasks."lint:rust:fix"]
description = "Auto-fix clippy warnings"
run         = "cargo clippy --workspace --fix --allow-dirty -- -D warnings"
sources     = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs"]

[tasks.check]
description = "Type-check all sources"
depends     = ["check:ts", "check:rust"]
alias       = "c"

[tasks."check:ts"]
description = "Type-check TypeScript sources"
run         = "pnpm exec tsc --noEmit"
sources     = [
  "src/**/*.ts",
  "tsconfig.json",
  "tsconfig.node.json",
  "tsconfig.browser.json"
]

[tasks."check:rust"]
description = "Check Rust sources compile"
run         = "cargo check --workspace"
sources     = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs"]

[tasks.fmt]
description = "Format all sources"
depends     = ["fmt:ts", "fmt:rust"]
alias       = "f"

[tasks."fmt:ts"]
description = "Format TypeScript sources with Prettier"
run         = "pnpm exec prettier --write src"
sources     = ["src/**/*.ts"]

[tasks."fmt:rust"]
description = "Format Rust sources"
run         = "cargo fmt --all"
sources     = ["crates/**/*.rs"]

[tasks.clean]
description = "Remove build artifacts"
run         = ["rm -rf build/", "cargo clean"]
alias       = "cl"
